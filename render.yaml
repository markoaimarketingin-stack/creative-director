services:
  - type: web
    name: marko-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: NANOBANANA_API_KEY
        sync: false
      - key: VERTEX_AI_PROJECT_ID
        sync: false
      - key: VERTEX_AI_LOCATION
        sync: false
      - key: VERTEX_AI_IMAGE_MODEL
        sync: false
